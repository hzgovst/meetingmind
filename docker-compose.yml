version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meetingmind-backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
      # Windows: uses %APPDATA%\gcloud (e.g. C:\Users\<user>\AppData\Roaming\gcloud)
      # Linux/Mac fallback: ${HOME}/.config/gcloud:/root/.config/gcloud:ro
      - ${APPDATA}/gcloud:/root/.config/gcloud:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/meetingmind.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meetingmind-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    driver: local
